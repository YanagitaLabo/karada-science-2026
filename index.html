<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>からだのサイエンス2026 測定入力</title>
<style>
  :root {
    --main-green: #1a7a3c;
    --accent-orange: #f39220;
    --bg: #f4f7f5;
  }
  * { box-sizing: border-box; }
  body {
    font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif;
    background: var(--bg);
    margin: 0;
    padding: 16px;
    color: #222;
  }
  .header {
    background: var(--main-green);
    color: white;
    padding: 14px 18px;
    border-radius: 10px;
    margin-bottom: 16px;
    font-size: 1.2em;
    font-weight: bold;
  }
  .card {
    background: white;
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.08);
  }
  .card h2 {
    font-size: 1.05em;
    margin: 0 0 10px 0;
    color: var(--main-green);
    border-left: 5px solid var(--accent-orange);
    padding-left: 8px;
  }
  label {
    display: block;
    font-size: 0.85em;
    color: #555;
    margin-bottom: 4px;
    margin-top: 8px;
  }
  input[type=text], input[type=number], select {
    width: 100%;
    padding: 10px;
    font-size: 1.1em;
    border: 1px solid #ccc;
    border-radius: 8px;
    background: #fff;
  }
  .row { display: flex; gap: 10px; }
  .row > div { flex: 1; }
  #idLookupResult {
    margin-top: 8px;
    padding: 8px 10px;
    border-radius: 8px;
    font-size: 0.95em;
  }
  #idLookupResult.ok { background: #e5f5ea; color: var(--main-green); }
  #idLookupResult.ng { background: #fdeaea; color: #c0392b; }
  button {
    width: 100%;
    padding: 16px;
    font-size: 1.2em;
    font-weight: bold;
    border: none;
    border-radius: 10px;
    background: var(--accent-orange);
    color: white;
    margin-top: 10px;
  }
  button:disabled { background: #ccc; }
  #status { text-align: center; margin-top: 12px; font-weight: bold; }
</style>
</head>
<body>

<div class="header">からだのサイエンス2026　測定データ入力</div>

<div class="card">
  <h2>参加者確認</h2>
  <label>ID</label>
  <input type="text" id="participantId" placeholder="例: S001" autocomplete="off">
  <div id="idLookupResult"></div>

  <label>測定回</label>
  <select id="round">
    <option value="STEP1">STEP1(7/25)</option>
    <option value="STEP3">STEP3(8/28)</option>
  </select>

  <label>入力スタッフ名</label>
  <input type="text" id="staff" placeholder="例: 柳田">
</div>

<div class="card">
  <h2>①10mスプリント</h2>
  <div class="row">
    <div><label>5mタイム(秒)</label><input type="number" step="0.001" id="v_5mタイム(秒)"></div>
    <div><label>10mタイム(秒)</label><input type="number" step="0.001" id="v_10mタイム(秒)"></div>
  </div>
  <div class="row">
    <div><label>ストライド(m)</label><input type="number" step="0.01" id="v_ストライド(m)"></div>
    <div><label>接地時間(秒)</label><input type="number" step="0.001" id="v_接地時間_スプリント(秒)"></div>
  </div>
</div>

<div class="card">
  <h2>②脚伸展力</h2>
  <label>脚伸展力(kg)</label>
  <input type="number" step="0.1" id="v_脚伸展力(kg)">
</div>

<div class="card">
  <h2>③全身反応時間</h2>
  <label>反応時間(ms)</label>
  <input type="number" step="1" id="v_反応時間(ms)">
</div>

<div class="card">
  <h2>④バーティカルジャンプ</h2>
  <div class="row">
    <div><label>跳躍高(cm)</label><input type="number" step="0.1" id="v_跳躍高(cm)"></div>
    <div><label>速度(m/s)</label><input type="number" step="0.01" id="v_速度(m/s)"></div>
  </div>
  <label>RSI</label>
  <input type="number" step="0.01" id="v_RSI">
</div>

<div class="card">
  <h2>⑤投球速度</h2>
  <label>初速(km/h)</label>
  <input type="number" step="0.1" id="v_投球初速(km/h)">
</div>

<div class="card">
  <h2>⑥リカバリーバランス(閉眼片足立ち)</h2>
  <label>保持時間(秒)</label>
  <input type="number" step="0.1" id="v_バランス保持時間(秒)">
</div>

<div class="card">
  <h2>⑦ステップテスト</h2>
  <div class="row">
    <div><label>接地時間(ms)</label><input type="number" step="1" id="v_ステップ接地時間(ms)"></div>
    <div><label>ステップ数(歩)</label><input type="number" step="1" id="v_ステップ数(歩)"></div>
  </div>
</div>

<div class="card">
  <h2>⑧プロアジリティテスト</h2>
  <label>タイム(秒)</label>
  <input type="number" step="0.01" id="v_プロアジリティタイム(秒)">
</div>

<button id="submitBtn" onclick="submitData()">この内容で登録する</button>
<div id="status"></div>

<script>
// ▼▼▼ ここをGASのWebアプリURLに差し替えてください ▼▼▼
const GAS_ENDPOINT = "https://script.google.com/macros/s/XXXXXXXXXXXXXXXXXXXX/exec";
// ▲▲▲ ここまで ▲▲▲

const idInput = document.getElementById('participantId');
const lookupResult = document.getElementById('idLookupResult');
let currentInfo = null;

idInput.addEventListener('blur', async () => {
  const id = idInput.value.trim();
  if (!id) return;
  lookupResult.className = '';
  lookupResult.textContent = '確認中...';
  try {
    const res = await fetch(`${GAS_ENDPOINT}?action=lookup&id=${encodeURIComponent(id)}`);
    const data = await res.json();
    if (data.status === 'ok') {
      currentInfo = data;
      lookupResult.className = 'ok';
      lookupResult.textContent = `${data.name}さん (${data.grade} / グループ${data.group}) ※内容を確認してください`;
    } else {
      currentInfo = null;
      lookupResult.className = 'ng';
      lookupResult.textContent = 'IDが見つかりません。参加者マスタを確認してください。';
    }
  } catch (e) {
    lookupResult.className = 'ng';
    lookupResult.textContent = '照会に失敗しました(通信エラー)。IDのまま登録は可能です。';
  }
});

const itemIds = [
  '5mタイム(秒)', '10mタイム(秒)', 'ストライド(m)', '接地時間_スプリント(秒)',
  '脚伸展力(kg)', '反応時間(ms)',
  '跳躍高(cm)', '速度(m/s)', 'RSI',
  '投球初速(km/h)',
  'バランス保持時間(秒)',
  'ステップ接地時間(ms)', 'ステップ数(歩)',
  'プロアジリティタイム(秒)'
];

async function submitData() {
  const id = idInput.value.trim();
  const round = document.getElementById('round').value;
  const staff = document.getElementById('staff').value.trim();
  const statusEl = document.getElementById('status');
  const btn = document.getElementById('submitBtn');

  if (!id) {
    statusEl.textContent = 'IDを入力してください';
    statusEl.style.color = '#c0392b';
    return;
  }

  const values = {};
  itemIds.forEach((key) => {
    const el = document.getElementById('v_' + key);
    if (el && el.value !== '') values[key] = Number(el.value);
  });

  const payload = {
    id: id,
    round: round,
    timestamp: new Date().toISOString(),
    staff: staff,
    values: values
  };

  btn.disabled = true;
  statusEl.textContent = '送信中...';
  statusEl.style.color = '#555';

  try {
    // Content-Type は text/plain 固定(CORSプリフライト回避のため)
    const res = await fetch(GAS_ENDPOINT, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload)
    });
    const data = await res.json();
    if (data.status === 'ok') {
      statusEl.textContent = `登録しました(${data.measurementId})`;
      statusEl.style.color = 'var(--main-green)';
      itemIds.forEach((key) => {
        const el = document.getElementById('v_' + key);
        if (el) el.value = '';
      });
      idInput.value = '';
      lookupResult.textContent = '';
    } else {
      statusEl.textContent = '登録に失敗しました: ' + data.message;
      statusEl.style.color = '#c0392b';
    }
  } catch (e) {
    statusEl.textContent = '通信エラーが発生しました。もう一度お試しください。';
    statusEl.style.color = '#c0392b';
  } finally {
    btn.disabled = false;
  }
}
</script>

</body>
</html>
